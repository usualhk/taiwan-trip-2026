<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣 — 2026.07</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@200;300;400&family=Noto+Serif+JP:wght@200;300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f4f2ef;
  --surface:  #faf9f7;
  --white:    #ffffff;
  --ink:      #3a3835;
  --ink-2:    #6a6760;
  --ink-3:    #1e1d1b;
  --ink-4:    #d4d1cc;
  --accent:   #5c7a52;
  --red:      #a03020;
  --blue:     #3a5275;
  --fnt:      'Noto Sans TC', sans-serif;
  --fnt-jp:   'Noto Serif JP', serif;
  --fnt-mono: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--fnt);
  font-weight: 300;
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.01em;
}
button, input, select { font-family: var(--fnt); }

/* ─── HEADER ─────────────────────────────── */
header {
  background: var(--ink);
  color: #fff;
  padding: 18px 72px 0;
  position: relative;
  overflow: hidden;
}
header::after {
  content: '旅';
  font-family: var(--fnt-jp);
  font-weight: 200;
  font-size: 180px;
  color: rgba(255,255,255,0.03);
  position: absolute;
  right: 36px;
  top: -30px;
  line-height: 1;
  pointer-events: none;
  user-select: none;
}
.h-eyebrow {
  font-family: var(--fnt-mono);
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #fff;
  margin-bottom: 6px;
}
.h-title {
  font-family: var(--fnt-jp);
  font-size: 36px;
  font-weight: 200;
  letter-spacing: 4px;
  line-height: 1;
  color: #fff;
  margin-bottom: 4px;
}
.h-subtitle {
  font-family: var(--fnt-mono);
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 4px;
  color: #fff;
  margin-bottom: 14px;
}
.nav {
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.07);
  margin-top: 4px;
}
.nav-btn {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.55);
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 12px 0;
  margin-right: 44px;
  border-bottom: 1px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  cursor: pointer;
  position: relative;
  bottom: -1px;
}
.nav-btn:hover { color: #fff; }
.nav-btn.active { color: #fff; border-bottom-color: var(--accent); }

/* ─── LAYOUT ─────────────────────────────── */
.tab-panel { display: none; }
.tab-panel.active { display: block; }
main { max-width: 760px; margin: 0 auto; padding: 64px 72px; }

.lbl {
  font-family: var(--fnt-mono);
  font-size: 8px;
  font-weight: 300;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 20px;
  margin-top: 52px;
}
.lbl:first-child { margin-top: 0; }

/* ─── FORM ───────────────────────────────── */
.form-block { margin-bottom: 52px; }
.row { display: grid; gap: 12px; margin-bottom: 12px; }
.row.c3 { grid-template-columns: 1fr 1fr 100px; }
.row.c4 { grid-template-columns: 1fr 1fr 1fr auto; }
.row.r-trip  { grid-template-columns: 1fr 150px 140px; }
.row.r-fixed { grid-template-columns: auto 1fr; }
.fg { display: flex; flex-direction: column; gap: 7px; }
.fg label {
  font-family: var(--fnt-mono);
  font-size: 8px;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--ink-3);
}
.fg input, .fg select {
  background: var(--white);
  border: 1px solid var(--ink-4);
  border-radius: 0;
  padding: 10px 12px;
  font-size: 13px;
  font-weight: 300;
  color: var(--ink);
  appearance: none;
  transition: border-color 0.15s;
  width: 100%;
  outline: none;
}
.fg input[type="checkbox"] {
  appearance: auto; -webkit-appearance: auto;
  width: 20px; height: 20px; min-width: 20px;
  padding: 0; border: 0; background: none;
  accent-color: var(--accent); cursor: pointer;
}
.chk-row { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; padding-top: 8px; }
.chk-lbl { display: flex; align-items: center; gap: 8px; font-size: 15px; cursor: pointer; white-space: nowrap; }
.fg input::placeholder { color: var(--ink-3); }
.fg input:focus, .fg select:focus { border-color: var(--ink-2); }
.btn-add {
  background: var(--ink);
  color: var(--bg);
  border: none;
  padding: 10px 22px;
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s;
  white-space: nowrap;
  align-self: flex-end;
  font-family: var(--fnt-mono);
}
.btn-add:hover { opacity: 0.65; }

/* ─── FILTER ─────────────────────────────── */
.filter-row { display: flex; gap: 6px; margin-bottom: 4px; }
.f-btn {
  background: none;
  border: 1px solid var(--ink-4);
  padding: 4px 14px;
  font-family: var(--fnt-mono);
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 1.5px;
  color: var(--ink-3);
  cursor: pointer;
  transition: all 0.15s;
}
.f-btn:hover { border-color: var(--ink-2); color: var(--ink-2); }
.f-btn.active { background: var(--ink); border-color: var(--ink); color: var(--bg); }
.sort-lnk {
  display: inline-block;
  margin-top: 10px;
  margin-bottom: 24px;
  background: none;
  border: none;
  font-family: var(--fnt-mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--accent);
  cursor: pointer;
  padding: 0;
  transition: opacity 0.15s;
}
.sort-lnk:hover { opacity: 0.55; }
.sort-row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }

/* ─── SPOT LIST ──────────────────────────── */
.spot-row {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  gap: 18px;
  align-items: start;
  padding: 18px 0;
  border-bottom: 1px solid var(--ink-4);
}
.spot-row:first-child { border-top: 1px solid var(--ink-4); }
.spot-idx {
  font-family: var(--fnt-mono);
  font-size: 9px;
  font-weight: 300;
  color: var(--ink-3);
  padding-top: 3px;
  letter-spacing: 0.5px;
}
.spot-name {
  font-size: 14px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 6px;
}
.spot-metas {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  font-family: var(--fnt-mono);
  font-size: 9px;
  font-weight: 300;
  color: var(--ink-3);
  letter-spacing: 0.5px;
  align-items: center;
}
.tag {
  font-family: var(--fnt-mono);
  font-size: 8px;
  font-weight: 300;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 2px 7px;
  border: 1px solid currentColor;
  white-space: nowrap;
}
/* 未訂位：閃動提醒 */
@keyframes bookPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
.book-no { animation: bookPulse 1.3s ease-in-out infinite; }
.tag-景點  { color: var(--blue);   border-color: rgba(58,82,117,0.35);  background: rgba(58,82,117,0.05);  }
.tag-食物  { color: var(--red);    border-color: rgba(160,48,32,0.35);  background: rgba(160,48,32,0.04);  }
.tag-咖啡店 { color: var(--accent); border-color: rgba(92,122,82,0.35); background: rgba(92,122,82,0.05);  }
.tag-購物  { color: #6b4a8a;       border-color: rgba(107,74,138,0.35); background: rgba(107,74,138,0.04); }
.tag-其他  { color: var(--ink-3);  border-color: var(--ink-4);          background: transparent; }
.tag-酒店  { color: var(--accent); border-color: rgba(92,122,82,0.4);   background: rgba(92,122,82,0.06);  }
.tag-航班  { color: var(--blue);   border-color: rgba(58,82,117,0.4);   background: rgba(58,82,117,0.06);  }
.tag-酒吧   { color: #c12b7a;      border-color: rgba(193,43,122,0.40); background: rgba(193,43,122,0.06); }
.tag-肥仔水 { color: #c47a1a;      border-color: rgba(196,122,26,0.4);  background: rgba(196,122,26,0.07); }

/* ─── 類型底色分類（景點列表 + 行程） ─── */
.spot-row.rt-景點,  .tl-item.rt-景點  { background: rgba(58,82,117,0.18);  box-shadow: inset 6px 0 0 #3a5275; }
.spot-row.rt-食物,  .tl-item.rt-食物  { background: rgba(160,48,32,0.18);  box-shadow: inset 6px 0 0 #a03020; }
.spot-row.rt-咖啡店, .tl-item.rt-咖啡店 { background: rgba(92,122,82,0.20);  box-shadow: inset 6px 0 0 #5c7a52; }
.spot-row.rt-酒吧,  .tl-item.rt-酒吧  { background: rgba(193,43,122,0.16); box-shadow: inset 6px 0 0 #c12b7a; }
.spot-row.rt-肥仔水, .tl-item.rt-肥仔水 { background: rgba(196,122,26,0.22); box-shadow: inset 6px 0 0 #c47a1a; }
.spot-row.rt-購物,  .tl-item.rt-購物  { background: rgba(107,74,138,0.18); box-shadow: inset 6px 0 0 #6b4a8a; }
.spot-row.rt-其他,  .tl-item.rt-其他  { background: rgba(106,103,96,0.14); box-shadow: inset 6px 0 0 #6a6760; }
.spot-row[class*="rt-"] { padding-left: 14px; padding-right: 10px; }
.tl-item[class*="rt-"]  { padding-left: 16px; padding-right: 10px; }
.spot-acts { display: flex; gap: 4px; padding-top: 2px; }
.ic {
  background: none;
  border: 1px solid var(--ink-4);
  padding: 5px 10px;
  font-family: var(--fnt-mono);
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 0.5px;
  color: var(--ink-3);
  cursor: pointer;
  transition: all 0.15s;
}
.ic:hover { border-color: var(--ink); color: var(--ink); }
.ic.del:hover { border-color: var(--red); color: var(--red); }
.empty {
  padding: 72px 0;
  text-align: center;
  font-family: var(--fnt-mono);
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--ink-3);
}

/* ─── ITINERARY ──────────────────────────── */
.itin-day { margin-bottom: 60px; }
.itin-hd {
  display: flex;
  align-items: baseline;
  gap: 18px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--ink);
}
.day-pill {
  font-family: var(--fnt-mono);
  font-size: 8px;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  background: var(--ink);
  color: var(--bg);
  padding: 4px 10px;
}
.day-datestr {
  font-family: var(--fnt-jp);
  font-size: 16px;
  font-weight: 200;
  color: var(--ink);
  letter-spacing: 1px;
}
.day-route {
  margin-left: auto;
  font-family: var(--fnt-mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  background: none;
  border: 1px solid var(--ink);
  color: var(--ink);
  padding: 6px 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.day-route:hover { background: var(--ink); color: var(--bg); }
.day-map-wrap {
  margin: 16px 0 20px;
  border: 1px solid var(--ink-4);
  overflow: hidden;
  background: var(--surface);
}
.day-map-iframe { display: block; width: 100%; height: 320px; border: 0; }
@media (max-width: 680px) {
  .day-map-iframe { height: 240px; }
}
.tl-item {
  padding: 16px 0;
  border-bottom: 1px solid var(--ink-4);
}
.tl-item.hotel { border-left: 2px solid rgba(92,122,82,0.4); padding-left: 14px; }
.tl-item.flight { border-left: 2px solid rgba(58,82,117,0.4); padding-left: 14px; }
.tl-name {
  font-size: 13px;
  font-weight: 400;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}
.tl-item.hotel .tl-name { color: var(--accent); font-weight: 300; }
.tl-item.flight .tl-name { color: var(--blue); font-weight: 300; }
.tl-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  font-family: var(--fnt-mono);
  font-size: 9px;
  font-weight: 300;
  color: var(--ink-3);
  letter-spacing: 0.5px;
  align-items: center;
}
.map-btn {
  background: none;
  border: none;
  font-family: var(--fnt-mono);
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 1px;
  color: var(--accent);
  cursor: pointer;
  padding: 0;
  transition: opacity 0.15s;
}
.map-btn:hover { opacity: 0.5; }
.tl-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: center;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--ink-4);
}
.tl-empty {
  padding: 18px 0;
  font-family: var(--fnt-mono);
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--ink-3);
  border-bottom: 1px solid var(--ink-4);
}

/* ─── SHOPPING ───────────────────────────── */
.shop-add-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.shop-add-row select {
  background: var(--white);
  border: 1px solid var(--ink-4);
  padding: 10px 12px;
  font-family: var(--fnt);
  font-size: 13px;
  color: var(--ink);
}
.shop-owner-tag {
  display: inline-block;
  font-family: var(--fnt-mono);
  font-size: 8px;
  letter-spacing: 1.5px;
  padding: 2px 6px;
  border: 1px solid;
  margin-top: 4px;
}
.owner-together { color: var(--accent); border-color: rgba(92,122,82,0.4); background: rgba(92,122,82,0.06); }
.owner-shy      { color: var(--blue);   border-color: rgba(58,82,117,0.4); background: rgba(58,82,117,0.06); }
.owner-christy  { color: #a04880;       border-color: rgba(160,72,128,0.4); background: rgba(160,72,128,0.06); }
.shop-add-row input {
  flex: 1;
  background: var(--white);
  border: 1px solid var(--ink-4);
  padding: 10px 12px;
  font-size: 13px;
  font-weight: 300;
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
}
.shop-add-row input::placeholder { color: var(--ink-3); }
.shop-add-row input:focus { border-color: var(--ink-2); }
.shop-prog {
  font-family: var(--fnt-mono);
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 24px;
}
.shop-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 0;
  border-bottom: 1px solid var(--ink-4);
  transition: opacity 0.2s;
}
.shop-row:first-child { border-top: 1px solid var(--ink-4); }
.shop-row.done { opacity: 0.3; }
.chk {
  width: 15px;
  height: 15px;
  border: 1px solid var(--ink-4);
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: transparent;
  transition: all 0.15s;
}
.chk.on { background: var(--accent); border-color: var(--accent); color: #fff; }
.shop-n { font-size: 13px; font-weight: 300; flex: 1; }
.shop-row.done .shop-n { text-decoration: line-through; }
.shop-w {
  font-family: var(--fnt-mono);
  font-size: 9px;
  font-weight: 300;
  color: var(--ink-3);
  letter-spacing: 0.5px;
  margin-top: 3px;
}
.shop-del {
  background: none;
  border: none;
  color: var(--ink-4);
  font-size: 14px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  transition: color 0.15s;
  font-family: var(--fnt-mono);
}
.shop-del:hover { color: var(--red); }

/* ─── RESPONSIVE ─────────────────────────── */
@media (max-width: 680px) {
  header { padding: 12px 24px 0; }
  main { padding: 36px 24px; }

  .h-eyebrow { font-size: 9px; margin-bottom: 4px; }
  .h-title { font-size: 26px; letter-spacing: 1px; margin-bottom: 2px; }
  .h-subtitle { font-size: 9px; margin-bottom: 8px; }

  .nav-btn { font-size: 10px; letter-spacing: 2px; margin-right: 24px; padding: 10px 0; }

  .row.c3, .row.c4, .row.r-trip, .row.r-fixed { grid-template-columns: 1fr; }
  .lbl { font-size: 9px; margin-top: 36px; }
  .fg label { font-size: 10px; }
  .fg input, .fg select { font-size: 15px; padding: 12px 14px; }
  .btn-add { font-size: 11px; padding: 13px 22px; width: 100%; text-align: center; }

  .spot-row { grid-template-columns: 28px 1fr auto; gap: 12px; padding: 16px 0; }
  .spot-idx { font-size: 10px; }
  .spot-name { font-size: 15px; }
  .spot-metas { font-size: 10px; gap: 8px; }
  .tag { font-size: 9px; padding: 3px 7px; }
  .ic { font-size: 10px; padding: 7px 12px; }

  .filter-row { flex-wrap: wrap; }
  .f-btn { font-size: 10px; padding: 6px 14px; }
  .sort-lnk { font-size: 10px; }

  .itin-hd { gap: 12px; padding-bottom: 12px; }
  .day-pill { font-size: 9px; }
  .day-datestr { font-size: 15px; }
  .tl-item { padding: 14px 0; }
  .tl-item.hotel, .tl-item.flight { padding-left: 12px; }
  .tl-name { font-size: 14px; gap: 8px; }
  .tl-meta { font-size: 10px; gap: 10px; }
  .map-btn { font-size: 10px; }
  .itin-day { margin-bottom: 44px; }

  .shop-add-row { flex-direction: column; }
  .shop-add-row input { font-size: 15px; padding: 12px 14px; }
  .shop-prog { font-size: 10px; }
  .shop-row { padding: 14px 0; gap: 14px; }
  .shop-n { font-size: 14px; }
  .shop-w { font-size: 10px; }
  .chk { width: 18px; height: 18px; font-size: 10px; }
}

/* ═══ 放大字體（全裝置） ═══ */
body { font-size: 15px; }
.spot-name { font-size: 17px; }
.spot-metas { font-size: 12px; }
.tag { font-size: 11px; }
.tl-name { font-size: 16px; }
.tl-meta { font-size: 12px; }
.map-btn { font-size: 12px; }
.shop-n { font-size: 16px; }
.shop-w { font-size: 12px; }
.shop-prog { font-size: 12px; }
.ic { font-size: 12px; }
.f-btn { font-size: 12px; }
.fg input, .fg select { font-size: 16px; }
.fg label { font-size: 11px; }
.lbl { font-size: 11px; }
.nav-btn { font-size: 13px; }
.day-datestr { font-size: 19px; }
.spot-idx { font-size: 12px; }
.shop-add-row input, .shop-add-row select { font-size: 16px; }
.sort-lnk { font-size: 11px; }

/* ═══ Mobile：唔好超出介面 ═══ */
html, body { max-width: 100%; overflow-x: hidden; }
main { overflow-x: hidden; }
.spot-row > div { min-width: 0; }
.spot-metas, .tl-meta { overflow-wrap: anywhere; word-break: break-word; }
.spot-metas > span, .tl-meta > span { min-width: 0; max-width: 100%; overflow-wrap: anywhere; word-break: break-word; }
.spot-acts { flex-wrap: wrap; justify-content: flex-end; }
@media (max-width: 680px) {
  .spot-row { grid-template-columns: 22px 1fr; }
  .spot-acts { grid-column: 1 / -1; margin-top: 8px; }
  .tl-meta .map-btn { padding: 4px 0; }
}
</style>
</head>
<body>

<header>
  <div class="h-eyebrow">Travel Planner</div>
  <div class="h-title">台 灣</div>
  <div class="h-subtitle">2026 . 07 . 01 &nbsp;—&nbsp; 07 . 05</div>
  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('spots',this)">景點 &amp; 食物</button>
    <button class="nav-btn" onclick="switchTab('itinerary',this)">行程</button>
    <button class="nav-btn" onclick="switchTab('shopping',this)">購物清單</button>
  </nav>
</header>

<!-- ══ SPOTS ══════════════════════════════ -->
<div id="tab-spots" class="tab-panel active">
<main>
  <div class="lbl" style="margin-top:36px">新增地點</div>
  <div class="form-block">
    <div class="row c3">
      <div class="fg"><label>名稱</label><input type="text" id="inp-name" placeholder="e.g. 士林夜市"></div>

<script>
let spots = [];
let shopItems = [];
let currentFilter = 'all';

let editingShopId = null;

const ownerLabel = { together: '一齊買！', shy: 'Shy', christy: 'Christy' };

/* ─── 訂位狀態：未訂位 ↔ 已訂位（撳一下切換） ─── */
const BOOK_ORDER = ['no', 'yes'];
const BOOK_LABEL = { no: '⚠ 未訂位！記得訂', yes: '✅ 已訂位' };
const BOOK_STYLE = {
  no:  'color:#fff;border-color:#a03020;background:#a03020;font-weight:600;letter-spacing:0.5px',
  yes: 'color:#2e7d32;border-color:#2e7d32;background:rgba(46,125,50,0.12)'
};
// 顯示邏輯：剔咗 已訂位/未訂位 先顯示；都冇剔就唔顯示
function bookState(s) { return (s.book === 'no' || s.book === 'yes') ? s.book : ''; }
// 兩個剔互斥：剔一個就熄另一個
function onBookCheck(which) {
  const yes = document.getElementById('inp-book-yes');
  const no  = document.getElementById('inp-book-no');
  if (which === 'yes' && yes.checked) no.checked = false;
  if (which === 'no'  && no.checked)  yes.checked = false;
}
function bookTag(s) {
  const bs = bookState(s);
  if (!bs) return '';
  return `<span class="tag book-${bs}" style="cursor:pointer;${BOOK_STYLE[bs]}" onclick="cycleBook(${s.id})">${BOOK_LABEL[bs]}</span>`;
}
// 固定時間：重新編排時唔郁
function fixedTag(s) {
  return s.fixed ? `<span class="tag" style="color:#fff;border-color:#6a6760;background:#6a6760">🔒 固定時間</span>` : '';
}
// 時段：早餐自動排前、晚餐自動排後
const SLOT_LABEL = { am: '🌅 早餐', noon: '🍱 午餐', pm: '🌙 晚餐' };
const SLOT_RANK  = { am: 0, noon: 1, pm: 2 };
function slotRank(s) { return s.slot in SLOT_RANK ? SLOT_RANK[s.slot] : 1.5; } // 不限放中間
function slotTag(s) {
  return s.slot && SLOT_LABEL[s.slot]
    ? `<span class="tag" style="color:#b5760d;border-color:rgba(181,118,13,0.4);background:rgba(181,118,13,0.07)">${SLOT_LABEL[s.slot]}</span>`
    : '';
}

/* ─── Supabase 連線 + 資料同步 ───────────── */
let sb = null;
const dbReady = () => sb !== null;

const spotToRow = s => ({ id: s.id, name: s.name, addr: s.addr, type: s.type, day: String(s.day), note: s.note, hours: s.hours, link: s.link || '', book: s.book || null, fixed: !!s.fixed, slot: s.slot || null, ord: s.order });
const rowToSpot = r => ({ id: r.id, name: r.name, addr: r.addr, type: r.type, day: r.day === 'auto' ? 'auto' : Number(r.day), note: r.note, hours: r.hours, link: r.link || '', book: r.book || (r.booked ? 'yes' : ''), fixed: !!r.fixed, slot: r.slot || '', order: r.ord });
const shopToRow = s => ({ id: s.id, name: s.name, place: s.where, owner: s.owner, link: s.link || '', done: s.done });
const rowToShop = r => ({ id: r.id, name: r.name, where: r.place, owner: r.owner, link: r.link || '', done: r.done });

async function save() {
  if (!dbReady()) return;
  if (spots.length)     await sb.from('spots').upsert(spots.map(spotToRow));
  if (shopItems.length) await sb.from('shop_items').upsert(shopItems.map(shopToRow));
}

async function loadAll() {
  if (!dbReady()) return;
  const [{ data: sp }, { data: sh }] = await Promise.all([
    sb.from('spots').select('*'),
    sb.from('shop_items').select('*')
  ]);
  spots     = (sp || []).map(rowToSpot);
  shopItems = (sh || []).map(rowToShop);
  renderSpots();
  if (document.getElementById('tab-itinerary').classList.contains('active')) renderItinerary();
  if (document.getElementById('tab-shopping').classList.contains('active'))   renderShop();
}

// 一次性：如果雲端係空但本機有舊資料，自動搬上雲端
async function maybeMigrate() {
  try {
    const oldSpots = JSON.parse(localStorage.getItem('tw3-spots') || '[]');
    const oldShop  = JSON.parse(localStorage.getItem('tw3-shop')  || '[]');
    if (spots.length === 0 && oldSpots.length) { spots = oldSpots; await save(); }
    if (shopItems.length === 0 && oldShop.length) { shopItems = oldShop; await save(); }
    if ((oldSpots.length || oldShop.length)) await loadAll();
  } catch (e) { /* ignore */ }
}

async function initDB() {
  if (!SUPABASE_URL.startsWith('http')) {
    document.body.insertAdjacentHTML('afterbegin',
      '<div style="background:#a03020;color:#fff;padding:10px 16px;font-family:monospace;font-size:12px;text-align:center">⚠ 未設定 Supabase — 資料未能共用。請喺 index.html 頂部貼上 SUPABASE_URL 同 ANON_KEY。</div>');
    return;
  }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  await loadAll();
  await maybeMigrate();
  sb.channel('trip-sync')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'spots' },      loadAll)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'shop_items' },  loadAll)
    .subscribe();
}

function addSpot() {
  const name  = document.getElementById('inp-name').value.trim();
  const addr  = document.getElementById('inp-addr').value.trim();
  const type  = document.getElementById('inp-type').value;
  const dayV  = document.getElementById('inp-day').value;
  const day   = dayV === 'auto' ? 'auto' : parseInt(dayV);
  const note  = document.getElementById('inp-note').value.trim();
  const hours = document.getElementById('inp-hours').value.trim();
  const link  = document.getElementById('inp-link').value.trim();
  const book  = document.getElementById('inp-book-yes').checked ? 'yes'
              : document.getElementById('inp-book-no').checked  ? 'no' : '';
  const fixed = document.getElementById('inp-fixed').checked;
  const slot  = document.getElementById('inp-slot').value;
  if (!name) return;
  const isEdit = editingSpotId != null;
  if (isEdit) {
    const s = spots.find(x => x.id === editingSpotId);
    if (s) {
      if (s.day !== day) s.order = spots.filter(x => x.day === day).length;
      Object.assign(s, { name, addr, type, day, note, hours, link, book, fixed, slot });
    }
    cancelEdit();
  } else {
    spots.push({ id: Date.now(), name, addr, type, day, note, hours, link, book, fixed, slot, order: spots.filter(s => s.day === day).length });
  }
  ['inp-name','inp-addr','inp-note','inp-hours','inp-link'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('inp-book-yes').checked = false;
  document.getElementById('inp-book-no').checked = false;
  document.getElementById('inp-fixed').checked = false;
  document.getElementById('inp-slot').value = '';
  // 新增時揀「由你決定」就即刻按距離自動編排到某一日，唔留喺待編排
  if (!isEdit && day === 'auto') {
    autoAssignDays(true);   // 內部會 save() + renderSpots()
  } else {
    save();
    renderSpots();
  }
}

function editSpot(id) {
  const s = spots.find(x => x.id === id);
  if (!s) return;
  editingSpotId = id;
  document.getElementById('inp-name').value  = s.name || '';
  document.getElementById('inp-addr').value  = s.addr || '';
  document.getElementById('inp-type').value  = s.type || '景點';
  document.getElementById('inp-day').value   = s.day != null ? String(s.day) : 'auto';
  document.getElementById('inp-hours').value = s.hours || '';

async function deleteSpot(id) {
  if (!confirm('確定刪除？')) return;
  spots = spots.filter(s => s.id !== id);
  renderSpots();
  if (document.getElementById('tab-itinerary').classList.contains('active')) renderItinerary();

}

// 由「行程」分頁編輯：先跳返「景點 & 食物」分頁，再打開編輯表格
function editFromItinerary(id) {
  const spotsTabBtn = document.querySelector('.nav-btn');
  switchTab('spots', spotsTabBtn);
  editSpot(id);
}

// 喺「行程」分頁手動上/下移動同一日內嘅景點順序（dir = -1 上, 1 下）
function moveSpot(id, dir) {
  const s = spots.find(x => x.id === id);
  if (!s) return;
  const sameDay = spots.filter(x => x.day === s.day).sort((a, b) => a.order - b.order);
  const idx = sameDay.findIndex(x => x.id === id);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= sameDay.length) return;
  // 重新編號確保連續，再對調
  sameDay.forEach((x, i) => { x.order = i; });
  const other = sameDay[swapIdx];
  const tmp = s.order; s.order = other.order; other.order = tmp;
  save();
  renderItinerary();
  renderSpots();
}

// 訂位狀態切換：未訂位 ↔ 已訂位
function cycleBook(id) {
  const s = spots.find(x => x.id === id);
  if (!s) return;
  const cur = bookState(s) || 'no';
  s.book = BOOK_ORDER[(BOOK_ORDER.indexOf(cur) + 1) % BOOK_ORDER.length];
  save();
  renderSpots();
  if (document.getElementById('tab-itinerary').classList.contains('active')) renderItinerary();
}

  window.open(url, '_blank');
}

function renderSpots() {

    list.innerHTML = '<div class="empty">— 尚未新增地點 —</div>';

    <div class="spot-row rt-${s.type}">

      <div>
        <div class="spot-name">${s.name}</div>

          ${bookTag(s)}
          ${fixedTag(s)}
          ${slotTag(s)}
          ${s.link ? `<span style="cursor:pointer;color:var(--accent)" onclick='window.open(${JSON.stringify(s.link)},"_blank")'>🔗 來源</span>` : ''}
          ${s.addr && !/^https?:\/\//.test(s.addr) ? `<span>${s.addr.length > 48 ? s.addr.slice(0,48)+'…' : s.addr}</span>` : ''}
          ${s.hours ? `<span>${s.hours}</span>` : ''}
          ${s.note  ? `<span>${s.note}</span>`  : ''}
        </div>
      </div>
      <div class="spot-acts">
        <button class="ic" onclick='openMap(${JSON.stringify(s)})'>Maps</button>
        <button class="ic" onclick="editSpot(${s.id})">✎</button>
        <button class="ic del" onclick="deleteSpot(${s.id})">×</button>
      </div>
    </div>`).join('');
}

function optimizeDay() {
  const dayFilter = currentFilter === 'all' ? null : currentFilter;
  let target = dayFilter ? spots.filter(s => s.day === dayFilter) : spots;
  if (!target.length) return;
  const ord = { '景點':0, '咖啡店':1, '食物':2, '肥仔水':3, '酒吧':4, '購物':5, '其他':6 };
  // 先按時段（早餐排前、晚餐排後），同時段先按類型
  target.sort((a, b) => slotRank(a) - slotRank(b) || (ord[a.type]||9) - (ord[b.type]||9));
  target.forEach((s, i) => { const sp = spots.find(x => x.id === s.id); if (sp) sp.order = i; });
  save(); renderSpots();
}

function getCoord(spot) {
  const addr = spot.addr || '';
  let m = addr.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return { lat:+m[1], lng:+m[2] };
  m = addr.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
  if (m) return { lat:+m[1], lng:+m[2] };
  m = addr.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return { lat:+m[1], lng:+m[2] };
  const txt = addr + ' ' + (spot.name || '');
  for (const [k, v] of Object.entries(TW_DISTRICTS)) {
    if (txt.includes(k)) return v;
  }
  return null;
}

function kmeans(pts, k) {
  if (pts.length <= k) return { centroids: pts.slice(), assignments: pts.map((_, i) => i) };
  const sorted = [...pts].sort((a, b) => a.lng - b.lng);
  let cents = Array.from({ length: k }, (_, i) => ({ ...sorted[Math.floor(i * pts.length / k)] }));
  const assigns = new Array(pts.length);
  for (let it = 0; it < 20; it++) {
    pts.forEach((p, i) => {
      let best = 0, bd = Infinity;
      cents.forEach((c, j) => {
        const d = (p.lat - c.lat) ** 2 + (p.lng - c.lng) ** 2;
        if (d < bd) { bd = d; best = j; }
      });
      assigns[i] = best;
    });
    cents = cents.map((c, j) => {
      const cluster = pts.filter((_, i) => assigns[i] === j);
      if (!cluster.length) return c;
      return {
        lat: cluster.reduce((a, p) => a + p.lat, 0) / cluster.length,
        lng: cluster.reduce((a, p) => a + p.lng, 0) / cluster.length
      };
    });
  }
  return { centroids: cents, assignments: assigns };
}

function autoAssignDays(silent) {
  const autoSpots = spots.filter(s => s.day === 'auto');
  if (!autoSpots.length) { if (!silent) alert('冇地點要編排。先喺日期揀「🤖 由你決定」。'); return; }

  autoSpots.forEach(s => { s._c = getCoord(s); });
  const withC = autoSpots.filter(s => s._c);
  const noC = autoSpots.filter(s => !s._c);

  const centroids = {};
  for (let d = 1; d <= 5; d++) {
    const cs = spots.filter(s => s.day === d).map(getCoord).filter(c => c);
    if (cs.length) {
      centroids[d] = {
        lat: cs.reduce((a, c) => a + c.lat, 0) / cs.length,
        lng: cs.reduce((a, c) => a + c.lng, 0) / cs.length
      };
    }
  }
  const anchorCount = Object.keys(centroids).length;

  if (anchorCount === 5) {
    withC.forEach(s => { s.day = nearestDay(s._c, centroids); });
  } else if (withC.length >= 5) {
    const km = kmeans(withC.map(s => s._c), 5);
    const order = km.centroids.map((c, i) => ({ c, i }))
      .sort((a, b) => a.c.lng - b.c.lng || a.c.lat - b.c.lat);
    const cMap = {};
    order.forEach((x, i) => { cMap[x.i] = i + 1; });
    withC.forEach((s, i) => { s.day = cMap[km.assignments[i]]; });
  } else {
    withC.sort((a, b) => a._c.lng - b._c.lng || a._c.lat - b._c.lat);
    withC.forEach((s, i) => { s.day = i + 1; });
  }

  noC.forEach(s => {
    const counts = [1,2,3,4,5].map(d => ({ d, n: spots.filter(x => x.day === d).length }));
    counts.sort((a, b) => a.n - b.n);
    s.day = counts[0].d;
  });

  autoSpots.forEach(s => delete s._c);
  [1,2,3,4,5].forEach(d => {
    spots.filter(x => x.day === d)
      .sort((a, b) => slotRank(a) - slotRank(b))   // 早餐排前、晚餐排後
      .forEach((s, i) => s.order = i);
  });

  save(); renderSpots();
  if (!silent) {
    const missing = noC.length ? `（${noC.length} 個冇坐標，按平均分配）` : '';
    alert(`✓ 已編排 ${autoSpots.length} 個地點到 Day 1–5 ${missing}`);
  }
}

function nearestDay(c, cents) {
  let best = 1, bd = Infinity;
  for (const [d, ct] of Object.entries(cents)) {
    const dist = (c.lat - ct.lat) ** 2 + (c.lng - ct.lng) ** 2;
    if (dist < bd) { bd = dist; best = +d; }
  }
  return best;
}

// 鎖定條件：已訂位 或 有填開放/用餐時間
function isLockedSpot(s) {
  return !!(bookState(s) === 'yes' || s.fixed);
}

// 重新編排：保留已訂位 / 固定時間嘅景點唔郁，其餘按距離重新分配
function reArrangeFlexible() {
  const flex = spots.filter(s => !isLockedSpot(s));
  if (!flex.length) { alert('冇景點需要重新編排（全部都已訂位或有固定時間）。'); return; }
  if (!confirm(`會保留已訂位 / 有固定時間嘅景點唔郁，其餘 ${flex.length} 個按距離重新分配。繼續？`)) return;

  const avg = cs => ({ lat: cs.reduce((a,c)=>a+c.lat,0)/cs.length, lng: cs.reduce((a,c)=>a+c.lng,0)/cs.length });

  // 每日錨點：優先用鎖定景點，冇就用嗰日其餘景點
  const centroids = {};
  for (let d = 1; d <= 5; d++) {
    let cs = spots.filter(s => s.day === d && isLockedSpot(s)).map(getCoord).filter(Boolean);
    if (!cs.length) cs = spots.filter(s => s.day === d).map(getCoord).filter(Boolean);
    if (cs.length) centroids[d] = avg(cs);
  }

  flex.forEach(s => { s._c = getCoord(s); });
  const withC = flex.filter(s => s._c);
  const noC = flex.filter(s => !s._c);

  if (Object.keys(centroids).length) {
    withC.forEach(s => { s.day = nearestDay(s._c, centroids); });
  } else if (withC.length >= 5) {
    const km = kmeans(withC.map(s => s._c), 5);
    const order = km.centroids.map((c, i) => ({ c, i })).sort((a, b) => a.c.lng - b.c.lng || a.c.lat - b.c.lat);
    const cMap = {}; order.forEach((x, i) => { cMap[x.i] = i + 1; });
    withC.forEach((s, i) => { s.day = cMap[km.assignments[i]]; });
  } else {
    withC.sort((a, b) => a._c.lng - b._c.lng || a._c.lat - b._c.lat);
    withC.forEach((s, i) => { s.day = (i % 5) + 1; });
  }

  // 冇座標嘅放最少景點嗰日
  noC.forEach(s => {
    const counts = [1,2,3,4,5].map(d => ({ d, n: spots.filter(x => x.day === d).length }));
    counts.sort((a, b) => a.n - b.n);
    s.day = counts[0].d;
  });

  flex.forEach(s => delete s._c);

  // 每日重新排序：先按時段（早餐前、晚餐後），鎖定有固定時間嘅按時間
  [1,2,3,4,5].forEach(d => {
    const inDay = spots.filter(x => x.day === d);
    inDay.sort((a, b) => {
      if (slotRank(a) !== slotRank(b)) return slotRank(a) - slotRank(b);
      const la = isLockedSpot(a), lb = isLockedSpot(b);
      if (la && lb) return (a.hours || '').localeCompare(b.hours || '');
      return 0;
    });
    inDay.forEach((s, i) => s.order = i);
  });

  save(); renderSpots();
  if (document.getElementById('tab-itinerary').classList.contains('active')) renderItinerary();
  alert('✓ 已重新編排（已訂位 / 固定時間嘅景點保持唔變）');
}

function dayRouteUrl(daySpots) {
  const hotel = '台北松河璞旅';
  if (!daySpots.length) return null;
  const stopStr = s => {
    const c = getCoord(s);
    return c ? `${c.lat},${c.lng}` : s.name;
  };
  const wps = daySpots.slice(0, 9).map(stopStr).map(encodeURIComponent).join('%7C');
  return `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(hotel)}&destination=${encodeURIComponent(hotel)}&waypoints=${wps}&travelmode=driving`;
}

function dayEmbedUrl(daySpots) {
  const hotelC = { lat: 25.0505, lng: 121.5775 }; // 台北松河璞旅（饒河街附近）
  const coords = daySpots.map(getCoord).filter(Boolean).slice(0, 8);
  const origin = `${hotelC.lat},${hotelC.lng}`;
  if (coords.length) {
    // 全部用座標，地圖先至會 zoom 去台北而唔係世界圖
    const stops = coords.map(c => `${c.lat},${c.lng}`);
    const daddr = [...stops, origin].map(encodeURIComponent).join('+to:');
    return `https://maps.google.com/maps?saddr=${encodeURIComponent(origin)}&daddr=${daddr}&output=embed`;
  }
  // 當日景點未有座標：起碼 center 喺酒店一帶
  return `https://maps.google.com/maps?q=${origin}&z=13&output=embed`;
}

function renderItinerary() {
  const view = document.getElementById('itineraryView');

  const hotelItem = (label, sub) => `
    <div class="tl-item hotel">
      <div class="tl-name"><span>${label}</span><span class="tag tag-酒店">酒店</span></div>
      <div class="tl-meta">
        <span>${sub}</span>
        <button class="map-btn" onclick="window.open('https://www.google.com/maps/search/?api=1&query=台北松河璞旅','_blank')">Maps →</button>
      </div>
    </div>`;

  const flightItem = (label, route, detail) => `
    <div class="tl-item flight">
      <div class="tl-name"><span>${label}</span><span class="tag tag-航班">航班</span></div>
      <div class="tl-meta"><span>${route}</span><span>${detail}</span></div>
    </div>`;

  let html = '';
  for (let d = 1; d <= 5; d++) {
    const daySpots = spots.filter(s => s.day === d).sort((a,b) => a.order - b.order);
    const routeUrl = dayRouteUrl(daySpots);
    const embedUrl = dayEmbedUrl(daySpots);
    html += `
    <div class="itin-day">
      <div class="itin-hd">
        <span class="day-pill">Day ${d}</span>
        <span class="day-datestr">${dayDates[d]}</span>
        ${routeUrl ? `<button class="day-route" onclick="window.open('${routeUrl}','_blank')">🗺️ 開Maps</button>` : ''}
      </div>
      ${embedUrl ? `<div class="day-map-wrap"><iframe class="day-map-iframe" src="${embedUrl}" loading="lazy" allowfullscreen></iframe></div>` : ''}`;

    if (d === 1) {
      html += flightItem('CX494 出發', 'HKG → TPE · 10:10 – 12:10', 'Cathay Pacific');
      html += hotelItem('Check-in · 台北松河璞旅', '璞致客房－雙床 · 4 晚');
    }

    html += hotelItem('台北松河璞旅', '出發');

    if (!daySpots.length) {
      html += `<div class="tl-empty">— 未有安排 —</div>`;
    } else {
      html += daySpots.map(s => `
        <div class="tl-item rt-${s.type}">
          <div class="tl-name"><span>${s.name}</span><span class="tag tag-${s.type}">${s.type}</span>${bookTag(s)}${fixedTag(s)}${slotTag(s)}</div>
          ${(s.addr && !/^https?:\/\//.test(s.addr)) || s.hours || s.note ? `<div class="tl-meta">
            ${s.addr && !/^https?:\/\//.test(s.addr) ? `<span>${s.addr.length > 60 ? s.addr.slice(0,60)+'…' : s.addr}</span>` : ''}
            ${s.hours ? `<span>${s.hours}</span>` : ''}
            ${s.note  ? `<span>${s.note}</span>`  : ''}
          </div>` : ''}
          <div class="tl-actions">
            <button class="map-btn" onclick="moveSpot(${s.id},-1)">↑ 上移</button>
            <button class="map-btn" onclick="moveSpot(${s.id},1)">↓ 下移</button>
            <button class="map-btn" onclick='openMap(${JSON.stringify(s)})'>Maps →</button>
            ${s.link ? `<button class="map-btn" onclick='window.open(${JSON.stringify(s.link)},"_blank")'>🔗 來源 →</button>` : ''}
            <button class="map-btn" onclick="editFromItinerary(${s.id})">✎ 編輯</button>
            <button class="map-btn" onclick="deleteSpot(${s.id})">× 刪除</button>
          </div>
        </div>`).join('');
    }

    html += hotelItem('台北松河璞旅', '返回');

    if (d === 5) {
      html += hotelItem('Check-out · 台北松河璞旅', '退房');
      html += flightItem('CX479 回程', 'TPE → HKG · 21:05 – 23:05', 'Cathay Pacific');
    }

    html += `</div>`;
  }
  view.innerHTML = html;
}

function addShopItem() {
  const name  = document.getElementById('shop-name-inp').value.trim();
  const where = document.getElementById('shop-where-inp').value.trim();
  const link  = document.getElementById('shop-link-inp').value.trim();
  const owner = document.getElementById('shop-owner-inp').value;
  if (!name) return;
  if (editingShopId != null) {
    const item = shopItems.find(s => s.id === editingShopId);
    if (item) Object.assign(item, { name, where, link, owner });
    cancelShopEdit();
  } else {
    shopItems.push({ id: Date.now(), name, where, link, owner, done: false });
  }
  ['shop-name-inp','shop-where-inp','shop-link-inp'].forEach(id => document.getElementById(id).value = '');
  save();
  renderShop();
}
function editShopItem(id) {
  const s = shopItems.find(x => x.id === id);
  if (!s) return;
  editingShopId = id;
  document.getElementById('shop-name-inp').value  = s.name || '';
  document.getElementById('shop-where-inp').value = s.where || '';
  document.getElementById('shop-link-inp').value  = s.link || '';
  document.getElementById('shop-owner-inp').value = s.owner || 'together';
  document.getElementById('shop-submit').textContent = '更新';
  document.getElementById('shop-cancel').style.display = 'inline-block';
  document.getElementById('shop-name-inp').scrollIntoView({ behavior: 'smooth', block: 'center' });
  document.getElementById('shop-name-inp').focus();
}
function cancelShopEdit() {
  editingShopId = null;
  document.getElementById('shop-submit').textContent = '加入';
  document.getElementById('shop-cancel').style.display = 'none';
  ['shop-name-inp','shop-where-inp','shop-link-inp'].forEach(id => document.getElementById(id).value = '');
}
function toggleShop(id) {
  const item = shopItems.find(s => s.id === id);
  if (item) { item.done = !item.done; save(); renderShop(); }
}
async function deleteShop(id) {
  shopItems = shopItems.filter(s => s.id !== id);
  renderShop();
  if (dbReady()) await sb.from('shop_items').delete().eq('id', id);
}
function filterShop(f, btn) {
  currentShopFilter = f;
  document.querySelectorAll('#tab-shopping .f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderShop();
}
function renderShop() {
  const visible = currentShopFilter === 'all' ? shopItems : shopItems.filter(s => (s.owner || 'together') === currentShopFilter);
  const done = visible.filter(s => s.done).length;
  document.getElementById('shop-progress').textContent = `${done} / ${visible.length} 已完成`;
  document.getElementById('shopGrid').innerHTML = visible.map(s => {
    const owner = s.owner || 'together';
    return `
    <div class="shop-row${s.done ? ' done' : ''}">
      <div class="chk${s.done ? ' on' : ''}" onclick="toggleShop(${s.id})">${s.done ? '✓' : ''}</div>
      <div style="flex:1;min-width:0">
        <div class="shop-n">${s.name}</div>
        ${s.where ? `<div class="shop-w">${s.where}</div>` : ''}
        <span class="shop-owner-tag owner-${owner}">${ownerLabel[owner]}</span>
        ${s.link ? `<span class="shop-w" style="cursor:pointer;color:var(--accent);margin-left:8px" onclick='window.open(${JSON.stringify(s.link)},"_blank")'>🔗 來源</span>` : ''}
      </div>
      <button class="shop-del" onclick="editShopItem(${s.id})" title="編輯" style="font-size:11px;color:var(--ink-3)">✎</button>
      <button class="shop-del" onclick="deleteShop(${s.id})">×</button>
    </div>`;
  }).join('');
}

renderSpots();
initDB();
</script>
